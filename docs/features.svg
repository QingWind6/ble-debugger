<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" font-family="-apple-system,Segoe UI,sans-serif">
  <rect width="800" height="200" rx="12" fill="#0d1117"/>

  <!-- Feature 1: Scan -->
  <g transform="translate(20,20)">
    <rect width="176" height="160" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="88" cy="50" r="24" fill="rgba(88,166,255,0.12)" stroke="#58a6ff"/>
    <text x="88" y="56" fill="#58a6ff" font-size="22" text-anchor="middle">&#x1F50D;</text>
    <text x="88" y="96" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">BLE Scan</text>
    <text x="88" y="116" fill="#8b949e" font-size="11" text-anchor="middle">Real-time discovery</text>
    <text x="88" y="132" fill="#8b949e" font-size="11" text-anchor="middle">with RSSI indicators</text>
  </g>

  <!-- Feature 2: GATT -->
  <g transform="translate(212,20)">
    <rect width="176" height="160" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="88" cy="50" r="24" fill="rgba(63,185,80,0.12)" stroke="#3fb950"/>
    <text x="88" y="56" fill="#3fb950" font-size="22" text-anchor="middle">&#x1F4CB;</text>
    <text x="88" y="96" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">GATT Explorer</text>
    <text x="88" y="116" fill="#8b949e" font-size="11" text-anchor="middle">Browse services &amp;</text>
    <text x="88" y="132" fill="#8b949e" font-size="11" text-anchor="middle">characteristics</text>
  </g>

  <!-- Feature 3: R/W -->
  <g transform="translate(404,20)">
    <rect width="176" height="160" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="88" cy="50" r="24" fill="rgba(210,153,34,0.12)" stroke="#d29922"/>
    <text x="88" y="56" fill="#d29922" font-size="22" text-anchor="middle">&#x26A1;</text>
    <text x="88" y="96" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">Read / Write</text>
    <text x="88" y="116" fill="#8b949e" font-size="11" text-anchor="middle">HEX &amp; Text mode</text>
    <text x="88" y="132" fill="#8b949e" font-size="11" text-anchor="middle">with notifications</text>
  </g>

  <!-- Feature 4: i18n + Theme -->
  <g transform="translate(596,20)">
    <rect width="184" height="160" rx="12" fill="#161b22" stroke="#30363d"/>
    <circle cx="92" cy="50" r="24" fill="rgba(219,109,40,0.12)" stroke="#db6d28"/>
    <text x="92" y="56" fill="#db6d28" font-size="22" text-anchor="middle">&#x1F3A8;</text>
    <text x="92" y="96" fill="#e6edf3" font-size="14" font-weight="600" text-anchor="middle">i18n &amp; Themes</text>
    <text x="92" y="116" fill="#8b949e" font-size="11" text-anchor="middle">中文 / English</text>
    <text x="92" y="132" fill="#8b949e" font-size="11" text-anchor="middle">Dark / Eyecare</text>
  </g>

  <rect width="800" height="200" rx="12" fill="none" stroke="#30363d"/>
</svg>
