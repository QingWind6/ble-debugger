  <line x1="0" y1="84" x2="320" y2="84" stroke="#30363d"/>
  <text x="16" y="69" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="0.5">设备 (5)</text>
  <rect x="228" y="52" width="80" height="26" rx="8" fill="#58a6ff"/>
  <text x="243" y="70" fill="#fff" font-size="12" font-weight="600">开始扫描</text>
  <!-- Device items -->
  <g transform="translate(8,92)">
    <rect width="304" height="50" rx="10" fill="rgba(88,166,255,0.12)" stroke="#58a6ff" stroke-width="1"/>
