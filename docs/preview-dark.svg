  <rect x="740" y="10" width="40" height="24" rx="6" fill="#58a6ff"/>
  <text x="750" y="26" fill="#fff" font-size="11" font-weight="600">中文</text>
  <text x="790" y="26" fill="#8b949e" font-size="11">EN</text>
