    <text x="14" y="30" fill="#3fb950" font-size="11" font-weight="700">-42 dBm</text>
    <text x="70" y="24" fill="#e6edf3" font-size="13" font-weight="600">Mi Band 7</text>
    <text x="70" y="40" fill="#8b949e" font-size="10" font-family="monospace">E4:F1:23:AB:CD:01</text>
  </g>
  <g transform="translate(8,148)">
    <rect width="304" height="50" rx="10" fill="transparent"/>
    <rect x="8" y="10" width="52" height="28" rx="6" fill="rgba(210,153,34,0.12)"/>
