      <text x="100" y="12" fill="#3fb950" font-size="11" font-family="monospace" font-weight="700">RX</text>
      <text x="124" y="12" fill="#8b949e" font-size="11" font-family="monospace">fff1</text>
      <text x="160" y="12" fill="#e6edf3" font-size="11" font-family="monospace">48 65 6C 6C 6F</text>
      <text x="248" y="12" fill="#8b949e" font-size="11" font-family="monospace" font-style="italic">"Hello"</text>
    </g>
    <line x1="8" y1="26" x2="316" y2="26" stroke="#30363d"/>
    <g transform="translate(8,32)">
      <text x="0" y="12" fill="#8b949e" font-size="11" font-family="monospace">14:23:02.567</text>
      <text x="100" y="12" fill="#58a6ff" font-size="11" font-family="monospace" font-weight="700">TX</text>
      <text x="124" y="12" fill="#8b949e" font-size="11" font-family="monospace">fff1</text>
      <text x="160" y="12" fill="#e6edf3" font-size="11" font-family="monospace">01 02 03</text>
    </g>
    <line x1="8" y1="50" x2="316" y2="50" stroke="#30363d"/>
    <g transform="translate(8,56)">
      <text x="0" y="12" fill="#8b949e" font-size="11" font-family="monospace">14:23:05.891</text>
      <text x="100" y="12" fill="#d29922" font-size="11" font-family="monospace" font-weight="700">NF</text>
      <text x="124" y="12" fill="#8b949e" font-size="11" font-family="monospace">fff1</text>
      <text x="160" y="12" fill="#e6edf3" font-size="11" font-family="monospace">64 00</text>
    </g>
    <line x1="8" y1="74" x2="316" y2="74" stroke="#30363d"/>
    <g transform="translate(8,80)">
      <text x="0" y="12" fill="#8b949e" font-size="11" font-family="monospace">14:23:08.123</text>
      <text x="100" y="12" fill="#3fb950" font-size="11" font-family="monospace" font-weight="700">RX</text>
      <text x="124" y="12" fill="#8b949e" font-size="11" font-family="monospace">2a19</text>
      <text x="160" y="12" fill="#e6edf3" font-size="11" font-family="monospace">5F</text>
