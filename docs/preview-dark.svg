    <text x="70" y="24" fill="#e6edf3" font-size="13" font-weight="600">ESP32-BLE</text>
    <text x="70" y="40" fill="#8b949e" font-size="10" font-family="monospace">A0:B1:C2:D3:E4:F5</text>
  </g>
  <g transform="translate(8,204)">
